services:
  chromadb:
    image: chromadb/chroma:1.5.3
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - CHROMA_HOST=http://chromadb:8000
    command: ["python", "-m", "cognitive_routing.demo_phase1"]

